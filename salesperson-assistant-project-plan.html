function PhaseCard({phase}){
  const [open,setOpen]=React.useState(false);
  const p=PAL[phase.id];
  return(
    <div onClick={()=>setOpen(!open)} style={{...surface,cursor:"pointer",borderLeft:`3px solid ${p.ink}`,transition:"box-shadow 0.15s"}} onMouseEnter={e=>e.currentTarget.style.boxShadow="0 2px 14px rgba(0,0,0,0.06)"} onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <div style={{width:30,height:30,borderRadius:7,background:p.bg,border:`1px solid ${p.ink}28`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:p.ink,flexShrink:0}}>{phase.id}</div>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{fontSize:14,fontWeight:600,color:"var(--ink)"}}>{phase.name}</span>
            {phase.optional&&<span style={{...chip(6,true),fontSize:9}}>Optional</span>}
            <span style={chip(phase.id,true)}>{phase.duration}</span>
          </div>
          <div style={{fontSize:11,color:"var(--ink4)",marginTop:2}}>{phase.tasks.length} tasks, click to expand</div>
        </div>
        <span style={{fontSize:11,color:"var(--ink4)",transition:"transform 0.2s",display:"inline-block",transform:open?"rotate(180deg)":"none"}}>▾</span>
      </div>
      {open&&(
        <div style={{marginTop:20}}>
          {phase.tasks.map((t,i)=>(
            <div key={i} style={{display:"flex",gap:12,padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
              <div style={{width:4,height:4,borderRadius:"50%",background:p.ink,flexShrink:0,marginTop:7,opacity:0.5}}/>
              <span style={{fontSize:13,color:"var(--ink2)",lineHeight:1.65}}>{t}</span>
            </div>
          ))}
          <div style={{marginTop:16,padding:"12px 16px",background:p.bg,border:`1px solid ${p.ink}22`,borderRadius:7,display:"flex",gap:10,alignItems:"flex-start"}}>
            <span style={{fontSize:12,color:p.ink,flexShrink:0}}>✓</span>
            <div>
              <div style={{fontSize:9,color:p.ink,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:3}}>Milestone</div>
              <div style={{fontSize:13,color:"var(--ink)",lineHeight:1.55}}>{phase.milestone}</div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function WorkflowDiagram(){
  const [hov,setHov]=React.useState(null);
  const CW=200,RH=104,NW=168,NH=60,PX=28,PY=28;
  const nodes=[
    {id:"sp",label:"Strategy Profile",sub:"Salesperson's playbook",col:0,row:0,pid:1},
    {id:"di",label:"Deal Intake",sub:"Client, stakeholders, stage",col:2,row:0,pid:2},
    {id:"ra",label:"Research Agent",sub:"Web, LinkedIn, News",col:1,row:1,pid:2},
    {id:"sm",label:"Stakeholder Map",sub:"Roles, influence, gaps",col:0,row:2,pid:1},
    {id:"ci",label:"Competitive Intel",sub:"Likely rivals identified",col:2,row:2,pid:4},
    {id:"ae",label:"Action Engine",sub:"Next-best actions + reasoning",col:1,row:3,pid:3},
    {id:"ii",label:"Interaction Ingestion",sub:"Emails, calls, notes",col:0,row:4,pid:4},
    {id:"ds",label:"Deal State",sub:"Live record, signals, risk",col:1,row:4,pid:6},
    {id:"re",label:"Re-rank Actions",sub:"Updated after each ingestion",col:2,row:4,pid:3},
    {id:"dx",label:"Diagnosis Engine",sub:"Select framework, fill fields",col:1,row:5,pid:5},
    {id:"dr",label:"Diagnosis Report",sub:"Gaps, evidence, export",col:0,row:6,pid:5},
    {id:"aq",label:"Action Queue",sub:"Prioritised daily actions",col:1,row:6,pid:3},
    {id:"db",label:"Deal Brief",sub:"One-pager for review",col:2,row:6,pid:2},
    {id:"ft",label:"Fine-tune (opt.)",sub:"Domain model, quarterly",col:3,row:5,pid:6},
  ];
  const inkV={1:"#3B5F91",2:"#8A5F22",3:"#3D6B4F",4:"#2A6B6B",5:"#7A3F3F",6:"#3D4E63",7:"#5C3D6E"};
  const bgV={1:"#EEF2F8",2:"#FBF3E6",3:"#EBF4EF",4:"#E8F3F3",5:"#F5EAEA",6:"#ECF0F5",7:"#F0EBF6"};
  const cx=c=>PX+c*CW+NW/2, cy=r=>PY+r*RH+NH/2, nx=c=>PX+c*CW, ny=r=>PY+r*RH;
  const W=PX*2+4*CW-(CW-NW), H=PY*2+7*RH-(RH-NH)+10;
  const byId=Object.fromEntries(nodes.map(n=>[n.id,n]));
  const edges=[["sp","ra"],["di","ra"],["ra","sm"],["ra","ci"],["sm","ae"],["ci","ae"],["ae","ii"],["ae","ds"],["ii","ds"],["ds","re"],["re","ae","loop",true],["ds","dx"],["dx","dr"],["dx","aq"],["dx","db"],["dx","ft","optional",true],["ft","dx","improves",true]];
  function ep(e){
    const f=byId[e[0]],t=byId[e[1]];
    if(!f||!t)return"";
    if(e[0]==="re"&&e[1]==="ae"){const x1=nx(f.col)+NW,y1=cy(f.row),x2=nx(t.col)+NW,y2=cy(t.row),bx=x1+38;return`M ${x1} ${y1} C ${bx} ${y1}, ${bx} ${y2}, ${x2} ${y2}`;}
    if(e[0]==="dx"&&e[1]==="ft")return`M ${nx(f.col)+NW} ${cy(f.row)} L ${nx(t.col)} ${cy(t.row)}`;
    if(e[0]==="ft"&&e[1]==="dx")return`M ${nx(f.col)} ${cy(f.row)+14} C ${nx(t.col)+NW+20} ${cy(t.row)+30}, ${nx(t.col)+NW+20} ${cy(t.row)+30}, ${nx(t.col)+NW} ${cy(t.row)+14}`;
    const x1=cx(f.col),y1=ny(f.row)+NH,x2=cx(t.col),y2=ny(t.row);
    if(f.col===t.col)return`M ${x1} ${y1} L ${x2} ${y2}`;
    const my=(y1+y2)/2;return`M ${x1} ${y1} C ${x1} ${my}, ${x2} ${my}, ${x2} ${y2}`;
  }
  const sectionLabels=["INPUTS","RESEARCH","CONTEXT MAP","SUGGESTIONS","ONGOING LOOP","DIAGNOSIS","OUTPUTS"];
  return(
    <div style={{...surface,marginTop:12,padding:28}}>
      <div style={{fontSize:11,color:"var(--ink4)",marginBottom:20,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:500}}>Agent Workflow Diagram</div>
      <div style={{overflowX:"auto"}}>
        <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{display:"block",minWidth:W}}>
          <defs><marker id="arw" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#C4BDB4"/></marker></defs>
          {sectionLabels.map((sl,i)=><text key={sl} x={PX} y={PY+i*RH-10} fontSize="8" fontWeight="600" fill="#A8A29E" letterSpacing="0.12em" fontFamily="DM Sans,sans-serif">{sl}</text>)}
          {edges.map((e,i)=>{
            const d=e[3],f=byId[e[0]];
            return<path key={i} d={ep(e)} fill="none" stroke={d?"#C4BDB4":inkV[f?f.pid:1]} strokeOpacity={d?0.5:0.35} strokeWidth={d?1.5:2} strokeDasharray={d?"5,4":"none"} markerEnd="url(#arw)"/>;
          })}
          {nodes.map(n=>{
            const ink=inkV[n.pid],bg=bgV[n.pid],h=hov===n.id;
            return(
              <g key={n.id} onMouseEnter={()=>setHov(n.id)} onMouseLeave={()=>setHov(null)} style={{cursor:"default"}}>
                {h&&<rect x={nx(n.col)-2} y={ny(n.row)-2} width={NW+4} height={NH+4} rx={10} fill={ink} opacity={0.12}/>}
                <rect x={nx(n.col)} y={ny(n.row)} width={NW} height={NH} rx={8} fill={bg} stroke={ink} strokeOpacity={h?0.7:0.3} strokeWidth={h?1.5:1}/>
                <rect x={nx(n.col)} y={ny(n.row)+8} width={3} height={NH-16} rx={1.5} fill={ink} opacity={0.6}/>
                <text x={nx(n.col)+14} y={ny(n.row)+24} fontSize="12" fontWeight="600" fill="#1C1917" fontFamily="DM Sans,sans-serif">{n.label}</text>
                <text x={nx(n.col)+14} y={ny(n.row)+40} fontSize="10" fill="#78716C" fontFamily="DM Sans,sans-serif">{n.sub}</text>
              </g>
            );
          })}
        </svg>
      </div>
      <div style={{display:"flex",gap:20,marginTop:14,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:24,height:2,background:"#3B5F91",opacity:0.45,borderRadius:1}}/><span style={{fontSize:11,color:"var(--ink3)"}}>Sequential flow</span></div>
        <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:24,height:2,background:"#C4BDB4",opacity:0.7,borderRadius:1,backgroundImage:"repeating-linear-gradient(90deg,#C4BDB4 0,#C4BDB4 5px,transparent 5px,transparent 9px)"}}/><span style={{fontSize:11,color:"var(--ink3)"}}>Feedback / optional</span></div>
      </div>
    </div>
  );
}

          {finetuneDetails.map(ft=>{const p=PAL[ft.pid];return(
            <div key={ft.model} style={{...surface,borderLeft:`3px solid ${p.ink}`,marginBottom:14}}>
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:16,marginBottom:14,flexWrap:"wrap"}}>
                <div><div style={{fontSize:14,fontWeight:600,color:"var(--ink)"}}>{ft.model}</div><div style={{fontSize:11,color:"var(--ink4)",marginTop:2}}>{ft.provider}</div></div>
                <span style={chip(ft.pid,false)}>Fine-tune option</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(180px, 1fr))",gap:10,marginBottom:14}}>
                {[{l:"Training cost",v:ft.trainingPerMTok,c:"#7A3F3F"},{l:"Inference in",v:ft.inferenceIn,c:"#3B5F91"},{l:"Inference out",v:ft.inferenceOut,c:"#7A3F3F"},{l:"Monthly @ 1K diagnoses",v:ft.monthlyAt1000,c:"#3D6B4F"}].map(s=>(
                  <div key={s.l} style={{background:"var(--bg)",border:"1px solid var(--border)",borderRadius:8,padding:"11px 14px"}}>
                    <div style={{fontSize:9,color:"var(--ink4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:5}}>{s.l}</div>
                    <div style={{fontSize:13,...mono,fontWeight:700,color:s.c}}>{s.v}</div>
                  </div>
                ))}
              </div>
              <div style={{padding:"10px 14px",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:7,fontSize:11,color:"var(--ink3)",lineHeight:1.65,marginBottom:10}}><strong style={{color:"var(--ink2)"}}>Example: </strong>{ft.trainingExample}</div>
              <div style={{padding:"10px 14px",background:p.bg,borderRadius:7,fontSize:12,color:"var(--ink2)",lineHeight:1.65}}><strong style={{color:p.ink}}>Notes: </strong>{ft.notes}</div>
            </div>
          );})}
          <div style={{...surface,borderTop:"2px solid var(--green)"}}>
            <div style={{fontSize:13,fontWeight:600,color:"var(--green)",marginBottom:12}}>Fine-tune ROI summary</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))",gap:12}}>
              {[{label:"Break-even vs Opus 4.6",value:"~180 diagnoses/mo",note:"Above that, fine-tuned inference wins decisively",pid:3},{label:"Training data needed",value:"200+ labelled deals",note:"With outcomes (won/lost) and quality annotations",pid:1},{label:"One-time training cost",value:"$0.45 - $3.75",note:"GPT-4o-mini vs GPT-4.1 base, 150K token dataset",pid:6},{label:"Retraining cadence",value:"Quarterly",note:"As more deal outcomes accumulate",pid:4}].map(s=>(
                <div key={s.label} style={{background:"var(--bg)",border:`1px solid ${PAL[s.pid].ink}22`,borderRadius:9,padding:"14px 16px"}}>
                  <div style={{fontSize:10,color:"var(--ink4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>{s.label}</div>
                  <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:PAL[s.pid].ink,lineHeight:1.2,marginBottom:6}}>{s.value}</div>
                  <div style={{fontSize:11,color:"var(--ink3)",lineHeight:1.55}}>{s.note}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function RisksTab(){
  const ic={"High":"var(--rose)","Medium":"var(--amber)","Low":"var(--green)"};
  const ib={"High":"var(--rose-bg)","Medium":"var(--amber-bg)","Low":"var(--green-bg)"};
  return(
    <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:10,overflow:"hidden"}}>
      <div style={{display:"grid",gridTemplateColumns:"3fr 0.55fr 3fr",background:"var(--surface2)",padding:"10px 22px",borderBottom:"1px solid var(--border)"}}>
        {["Risk","Impact","Mitigation"].map((h,i)=><div key={h} style={{fontSize:10,color:"var(--ink4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",paddingLeft:i>0?16:0}}>{h}</div>)}
      </div>
      {keyRisks.map((r,i)=>(
        <div key={r.risk} style={{display:"grid",gridTemplateColumns:"3fr 0.55fr 3fr",padding:"14px 22px",borderBottom:i<keyRisks.length-1?"1px solid var(--border)":"none",background:i%2===0?"var(--surface)":"var(--bg)",alignItems:"start"}}>
          <div style={{fontSize:13,color:"var(--ink)",paddingRight:16,lineHeight:1.5}}>{r.risk}</div>
          <div style={{paddingLeft:16}}><span style={{display:"inline-block",background:ib[r.impact],color:ic[r.impact],border:`1px solid ${ic[r.impact]}33`,borderRadius:4,padding:"2px 8px",fontSize:10,fontWeight:600}}>{r.impact}</span></div>
          <div style={{fontSize:12,color:"var(--ink3)",paddingLeft:16,lineHeight:1.65}}>{r.mitigation}</div>
        </div>
      ))}
    </div>
  );
}

function App(){
  const [tab,setTab]=React.useState("phases");
  const tabs=[{id:"phases",label:"Phases"},{id:"architecture",label:"Architecture"},{id:"diagnosis",label:"Diagnosis Engine"},{id:"tech",label:"Tech Stack"},{id:"pricing",label:"Pricing & Cost"},{id:"risks",label:"Risks"}];
  return(
    <div style={{fontFamily:"'DM Sans',sans-serif",background:"var(--bg)",minHeight:"100vh",paddingBottom:60}}>
      <div style={{background:"var(--surface)",borderBottom:"1px solid var(--border)",padding:"44px 52px 34px"}}>
        <div style={{maxWidth:1100,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:32,flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:300}}>
              <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
                {[{l:"Project Plan",pid:1},{l:"AI Agent",pid:2},{l:"Sales Tech",pid:3}].map(b=><span key={b.l} style={chip(b.pid,true)}>{b.l}</span>)}
              </div>
              <h1 style={{fontFamily:"'DM Serif Display',Georgia,serif",fontSize:34,fontWeight:400,color:"var(--ink)",letterSpacing:"-0.01em",lineHeight:1.15,marginBottom:12}}>Salesperson AI Assistant</h1>
              <p style={{fontSize:14,color:"var(--ink3)",maxWidth:520,lineHeight:1.75}}>An AI agent that ingests a salesperson's strategy, deeply researches each new deal, suggests next actions with explicit reasoning, and performs best-in-class sales diagnoses, continuously updated as the deal evolves.</p>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,flexShrink:0}}>
              {[{l:"Phases",v:"7",pid:1},{l:"Timeline",v:"8 wks",pid:4},{l:"Frameworks",v:"6+",pid:5},{l:"Pilot · 5 users",v:"~$190/mo",pid:3}].map(s=>(
                <div key={s.l} style={{background:PAL[s.pid].bg,border:`1px solid ${PAL[s.pid].ink}22`,borderRadius:9,padding:"14px 18px",textAlign:"center",minWidth:88}}>
                  <div style={{fontFamily:"'DM Serif Display',serif",fontSize:s.v.length>5?16:26,color:PAL[s.pid].ink,lineHeight:1}}>{s.v}</div>
                  <div style={{fontSize:10,color:"var(--ink4)",marginTop:5,textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:500}}>{s.l}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{marginTop:28,padding:"14px 18px",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:9}}>
            <div style={{fontSize:10,color:"var(--ink4)",marginBottom:10,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:500}}>Core Agent Flow</div>
            <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
              {[{l:"Strategy Profile",pid:1},{sep:true},{l:"Deal Intake",pid:2},{sep:true},{l:"Deep Research",pid:2},{sep:true},{l:"Action Suggestions",pid:3},{sep:true},{l:"Interaction Ingestion",pid:4},{sep:true},{l:"Diagnosis",pid:5},{sep:true},{l:"Report & Next Actions",pid:3}].map((item,i)=>
                item.sep?<span key={i} style={{fontSize:12,color:"var(--ink4)"}}>→</span>:<span key={i} style={{...chip(item.pid,true),borderRadius:20,padding:"3px 11px"}}>{item.l}</span>
              )}
            </div>
          </div>
        </div>
      </div>
      <div style={{background:"var(--surface)",borderBottom:"1px solid var(--border)",padding:"0 52px"}}>
        <div style={{maxWidth:1100,margin:"0 auto",display:"flex",gap:0,overflowX:"auto"}}>
          {tabs.map(t=>{const a=tab===t.id;return<button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"12px 20px",fontSize:13,fontWeight:a?600:400,color:a?"var(--ink)":"var(--ink4)",borderBottom:a?"2px solid var(--accent)":"2px solid transparent",marginBottom:-1,background:"none",cursor:"pointer",whiteSpace:"nowrap",transition:"color 0.15s"}}>{t.label}</button>;})}
        </div>
      </div>
      <div style={{maxWidth:1100,margin:"0 auto",padding:"28px 52px 0"}}>
        {tab==="phases"&&(
          <div>
            <p style={{fontSize:12,color:"var(--ink4)",marginBottom:18}}>Click any phase to expand tasks and milestone.</p>
            {phases.map(p=><PhaseCard key={p.id} phase={p}/>)}
            <div style={{...surface,marginTop:8}}>
              <div style={{fontSize:11,color:"var(--ink4)",marginBottom:14,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:500}}>Timeline Overview</div>
              <div style={{display:"flex",borderRadius:7,overflow:"hidden",border:"1px solid var(--border)"}}>
                {phases.map(p=>(
                  <div key={p.id} title={p.name} style={{flex:p.id>=6?1.4:1,background:PAL[p.id].bg,borderRight:p.id<7?"1px solid var(--border)":"none",padding:"9px 8px",textAlign:"center"}}>
                    <div style={{fontSize:11,fontWeight:600,color:PAL[p.id].ink}}>{p.id}</div>
                    <div style={{fontSize:9,color:"var(--ink4)",marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.duration}</div>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:5}}><span style={{fontSize:10,color:"var(--ink4)"}}>Day 1</span><span style={{fontSize:10,color:"var(--ink4)"}}>Week 8</span></div>
            </div>
            <WorkflowDiagram/>
          </div>
        )}
        {tab==="architecture"&&<ArchitectureTab/>}
        {tab==="diagnosis"&&<DiagnosisTab/>}
        {tab==="tech"&&<TechTab/>}
        {tab==="pricing"&&<PricingTab/>}
        {tab==="risks"&&<RisksTab/>}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
